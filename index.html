<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jay's Pantry</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --border: #2e3250;
    --text: #e8eaf6;
    --text2: #8b90b8;
    --text3: #555a7a;
    --green: #4caf78;
    --green-bg: #0e2419;
    --red: #e07070;
    --red-bg: #2a1010;
    --orange: #e0a050;
    --orange-bg: #2a1a08;
    --blue: #6090e0;
    --blue-bg: #0a1828;
    --accent: #7c6af7;
    --accent2: #5c4dd6;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 16px; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 800px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .header h1 { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .header h1 span { color: var(--accent); }
  .phase-badge { font-size: 10px; padding: 3px 9px; border-radius: 20px; background: var(--red-bg); color: var(--red); font-weight: 600; white-space: nowrap; border: 1px solid #4a1818; }

  /* TABS */
  .tabs { background: var(--bg2); border-bottom: 1px solid var(--border); }
  .tabs-inner { max-width: 800px; margin: 0 auto; display: flex; }
  .tab { padding: 12px 20px; font-size: 14px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; background: none; border-top: none; border-left: none; border-right: none; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* MAIN */
  .main { max-width: 800px; margin: 0 auto; padding: 16px; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
  .stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 6px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }

  /* LEGEND */
  .legend { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .flag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .f-ok { background: var(--green-bg); color: var(--green); }
  .f-sibo { background: var(--red-bg); color: var(--red); }
  .f-diab { background: var(--orange-bg); color: var(--orange); }
  .f-thy { background: var(--blue-bg); color: var(--blue); }

  /* FILTERS */
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .filter-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); font-weight: 500; transition: all .15s; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn:hover:not(.active) { border-color: var(--text3); color: var(--text); }

  /* SEARCH & ADD */
  .search-add { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-add input[type=text] { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 14px; outline: none; }
  .search-add input[type=text]:focus { border-color: var(--accent); }
  .search-input { flex: 1; min-width: 150px; }
  .name-input { flex: 2; min-width: 150px; }
  select { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; color: var(--text); font-size: 13px; outline: none; cursor: pointer; }
  select:focus { border-color: var(--accent); }
  .add-btn { background: var(--accent); border: none; border-radius: 8px; padding: 9px 16px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .add-btn:hover { background: var(--accent2); }

  /* CATEGORY */
  .cat-head { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; padding: 14px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .cat-count { font-weight: 400; }

  /* ITEM */
  .item { display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); margin-bottom: 4px; transition: border-color .1s; }
  .item:hover { border-color: var(--text3); }
  .item-name { flex: 1; font-size: 13px; color: var(--text); line-height: 1.3; min-width: 0; }
  .item-flags { display: flex; gap: 3px; flex-shrink: 0; }
  .info-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 15px; padding: 2px 4px; flex-shrink: 0; line-height: 1; }
  .info-btn:hover { color: var(--text2); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 15px; padding: 2px 4px; flex-shrink: 0; line-height: 1; }
  .del-btn:hover { color: var(--red); }
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }

  /* RECIPES TAB */
  .recipes-grid { display: grid; gap: 12px; }
  .recipe-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .recipe-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .recipe-header:hover { background: var(--bg3); }
  .recipe-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .recipe-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .recipe-chevron { color: var(--text3); font-size: 18px; transition: transform .2s; flex-shrink: 0; }
  .recipe-chevron.open { transform: rotate(180deg); }
  .recipe-body { padding: 0 16px 16px; border-top: 1px solid var(--border); display: none; }
  .recipe-body.open { display: block; }
  .recipe-section { margin-top: 14px; }
  .recipe-section h4 { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
  .ingredient-list { list-style: none; }
  .ingredient-list li { font-size: 13px; color: var(--text2); padding: 3px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .ingredient-list li:last-child { border-bottom: none; }
  .ing-amount { color: var(--accent); font-weight: 600; white-space: nowrap; min-width: 60px; }
  .step-list { list-style: none; counter-reset: steps; }
  .step-list li { counter-increment: steps; font-size: 13px; color: var(--text2); padding: 8px 0 8px 32px; border-bottom: 1px solid var(--border); position: relative; line-height: 1.5; }
  .step-list li:last-child { border-bottom: none; }
  .step-list li::before { content: counter(steps); position: absolute; left: 0; top: 8px; width: 22px; height: 22px; background: var(--bg3); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--accent); text-align: center; line-height: 22px; }
  .recipe-note { margin-top: 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--text2); line-height: 1.5; }
  .sibo-safe-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 2px 8px; border-radius: 20px; background: var(--green-bg); color: var(--green); font-weight: 600; border: 1px solid #1a3a28; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>Jay's <span>Pantry</span></h1>
    <span class="phase-badge">⚠ SIBO Eradication Active</span>
  </div>
</div>

<div class="tabs">
  <div class="tabs-inner">
    <button class="tab active" onclick="showTab('pantry',this)">Pantry</button>
    <button class="tab" onclick="showTab('recipes',this)">Recipes</button>
  </div>
</div>

<div class="main">

  <!-- PANTRY TAB -->
  <div id="tab-pantry">

    <div class="legend">

    <div class="filters" id="filters">

      <button class="filter-btn" onclick="setFilter('ok',this)">Safe now</button>
      <button class="filter-btn" onclick="setFilter('sibo',this)">SIBO holds</button>
      <button class="filter-btn" onclick="setFilter('diab',this)">Diabetes</button>
      <button class="filter-btn" onclick="setFilter('thy',this)">Thyroid</button>
    </div>
    <div class="search-add">
      <input type="text" class="search-input" id="searchBox" placeholder="Search pantry..." oninput="render()">
    </div>
    <div class="search-add">
      <input type="text" class="name-input" id="newName" placeholder="Add new item..." onkeydown="if(event.key==='Enter')addItem()">
      <select id="newCat">
        <option>Spices & seasonings</option><option>Oils & vinegars</option><option>Proteins</option>
        <option>Dairy & eggs</option><option>Dairy & milk</option><option>Nuts & seeds</option>
        <option>Grains & starches</option><option>Canned beans & legumes</option><option>Canned vegetables</option>
        <option>Condiments</option><option>Sweeteners</option><option>Frozen</option>
        <option>Fresh produce</option><option>Fermented</option><option>Bread</option>
        <option>Supplements</option><option>Baking</option><option>Treats</option><option>Other</option>
      </select>
      <button class="add-btn" onclick="addItem()">+ Add</button>
    </div>
    <div id="list"></div>
  </div>

  <!-- RECIPES TAB -->
  <div id="tab-recipes" style="display:none">
    <div class="recipes-grid" id="recipes-list"></div>
  </div>

</div>

const FLAG_STYLES = {ok:{cls:"f-ok",label:"✓ OK"},sibo:{cls:"f-sibo",label:"SIBO"},diab:{cls:"f-diab",label:"Diab"},thy:{cls:"f-thy",label:"Thyroid"}};

let items = ITEMS.map((r,i)=>({...r,id:i+1}));
let nextId = items.length+1;
let activeFilter = "all";

function autoFlag(n){
  const nl=n.toLowerCase();
  if(/garlic|onion|leek|shallot/.test(nl))return["sibo"];
  if(/honey|sugar|syrup|molasses|agave|date/.test(nl))return["sibo","diab"];
  if(/flax/.test(nl))return["sibo","thy"];
  if(/lentil|legume|bean|chickpea/.test(nl))return["sibo"];
  return["ok"];
}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  render();
}

function addItem(){
  const n=document.getElementById("newName").value.trim();
  const c=document.getElementById("newCat").value;
  if(!n)return;
  items.push({n,c,f:autoFlag(n),note:"",id:nextId++});
  document.getElementById("newName").value="";
  render();
}

function removeItem(id){items=items.filter(i=>i.id!==id);render();}

function showNote(id){
  const item=items.find(i=>i.id===id);
  if(!item||!item.note)return;
  alert(item.n+"\n\n"+item.note);
}

function render(){
  const search=document.getElementById("searchBox").value.toLowerCase();
  const filtered=items.filter(item=>{
    const ms=!search||item.n.toLowerCase().includes(search)||item.c.toLowerCase().includes(search);
    const mf=activeFilter==="all"||item.f.includes(activeFilter);
    return ms&&mf;
  });

  const total=items.length;
  const ok=items.filter(i=>i.f.length===1&&i.f[0]==="ok").length;
  const sibo=items.filter(i=>i.f.includes("sibo")).length;
  const diab=items.filter(i=>i.f.includes("diab")).length;
  const thy=items.filter(i=>i.f.includes("thy")).length;

  document.getElementById("stats").innerHTML=`
    <div class="stat"><div class="stat-num" style="color:var(--text)">${total}</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--green)">${ok}</div><div class="stat-lbl">Safe now</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--red)">${sibo}</div><div class="stat-lbl">SIBO hold</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--orange)">${diab}</div><div class="stat-lbl">Diabetes</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--blue)">${thy}</div><div class="stat-lbl">Thyroid</div></div>
  `;

  const cats=[...new Set(filtered.map(i=>i.c))].sort();
  let html="";
  if(!filtered.length){html='<div class="empty">No items match.</div>';}
  else{
    cats.forEach(cat=>{
      const ci=filtered.filter(i=>i.c===cat);
      html+=`<div class="cat-head"><span>${cat}</span><span class="cat-count">${ci.length} items</span></div>`;
      ci.forEach(item=>{
        const flags=item.f.map(f=>`<span class="flag ${FLAG_STYLES[f].cls}">${FLAG_STYLES[f].label}</span>`).join("");
        html+=`<div class="item">
          <div class="item-name">${item.n}</div>
          <div class="item-flags">${flags}</div>
          ${item.note?`<button class="info-btn" onclick="showNote(${item.id})" title="Notes">ⓘ</button>`:""}
          <button class="del-btn" onclick="removeItem(${item.id})" title="Remove">✕</button>
        </div>`;
      });
    });
  }
  document.getElementById("list").innerHTML=html;
}

function showTab(tab, el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("tab-pantry").style.display = tab==="pantry"?"block":"none";
  document.getElementById("tab-recipes").style.display = tab==="recipes"?"block":"none";
}

function buildRecipes(){
  const html = RECIPES.map(r=>`
    <div class="recipe-card">
      <div class="recipe-header" onclick="toggleRecipe(${r.id})">
        <div>
          <div class="recipe-title">${r.title}</div>
          <div class="recipe-meta">${r.meta} &nbsp;<span class="sibo-safe-badge">✓ SIBO Safe</span></div>
        </div>
        <div class="recipe-chevron" id="chev-${r.id}">▾</div>
      </div>
      <div class="recipe-body" id="body-${r.id}">
        <div class="recipe-section">
          <h4>Ingredients</h4>
          <ul class="ingredient-list">
            ${r.ingredients.map(i=>`<li><span class="ing-amount">${i.a}</span><span>${i.n}</span></li>`).join("")}

        </div>

}

}
